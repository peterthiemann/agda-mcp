name: Release

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish npm and GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install trusted-publishing capable npm CLI
        run: npm install --global npm@12.0.1

      - name: Validate tag and package version
        id: version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          tag_version="${RELEASE_TAG#release-}"
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Expected release-X.Y or release-X.Y.Z, got ${RELEASE_TAG}" >&2
            exit 1
          fi

          normalized_version="$tag_version"
          if [[ "$tag_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            normalized_version="${tag_version}.0"
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "$normalized_version" != "$package_version" ]]; then
            echo "Tag version ${normalized_version} does not match package version ${package_version}" >&2
            exit 1
          fi

          echo "version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:all
      - run: npm run build
      - run: npm run smoke

      - name: Pack release tarball
        id: pack
        shell: bash
        run: |
          tarball="$(npm pack --ignore-scripts --silent)"
          test -n "$tarball"
          test -f "$tarball"
          sha256sum "$tarball" > "${tarball}.sha256"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - name: Publish package to npm
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm publish "$TARBALL" --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" \
            "$TARBALL" \
            "${TARBALL}.sha256" \
            --verify-tag \
            --title "agda-mcp ${VERSION}" \
            --generate-notes
